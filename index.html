<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="الخوارزمي - مؤسسة الخوارزمي للتدريب والابتكار">
    <title>الخوارزمي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="assets/logo.png">
</head>
<body>

    <!-- Ambient background orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="container">

        <!-- Logo Section -->
        <div class="logo-section">
            <div class="logo-ring">
                <img src="assets/logo.png" alt="شعار الخوارزمي" class="logo">
            </div>
        </div>

        <!-- Bio Section -->
        <div class="bio-section">
            <h1>الخوارزمي</h1>
            <p class="bio-text">مؤسسة الخوارزمي للتدريب والابتكار</p>
            <div class="divider">
                <span></span><i class="fas fa-star"></i><span></span>
            </div>
        </div>

        <!-- Social Links Section -->
        <div class="social-links">

            <a href="https://t.me/alkhawarezmi" class="social-btn" title="تواصل معنا على تليجرام">
                <div class="btn-icon"><i class="fab fa-telegram"></i></div>
                <span class="btn-label">تليجرام</span>
                <i class="fas fa-arrow-left btn-arrow"></i>
            </a>

            <a href="https://www.instagram.com/alkhawarezmi_ct/" class="social-btn" title="متابعة على إنستجرام">
                <div class="btn-icon"><i class="fab fa-instagram"></i></div>
                <span class="btn-label">إنستجرام</span>
                <i class="fas fa-arrow-left btn-arrow"></i>
            </a>

            <a href="https://www.facebook.com/alkhawarezmi" class="social-btn" title="متابعة على فيسبوك">
                <div class="btn-icon"><i class="fab fa-facebook-f"></i></div>
                <span class="btn-label">فيسبوك</span>
                <i class="fas fa-arrow-left btn-arrow"></i>
            </a>

            <a href="https://docs.google.com/forms/d/e/1FAIpQLSf_5b0zBxMWbGf2l_CPSRdhQheJqL6p5sOCriDa04P4CgwLMA/viewform?usp=publish-editor"
               class="social-btn social-btn--featured" title="التسجيل لحضور ورشة الذكاء الصناعي" target="_blank">
                <div class="btn-icon"><i class="fas fa-clipboard-list"></i></div>
                <span class="btn-label">التسجيل لحضور ورشة الذكاء الصناعي</span>
                <i class="fas fa-arrow-left btn-arrow"></i>
            </a>

        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 الخوارزمي. جميع الحقوق محفوظة.</p>
        </footer>

    </div>
</body>
</html>
